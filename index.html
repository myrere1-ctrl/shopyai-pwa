document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

#FFF9F7; margin-bottom:10px;\">\n                  <span style=\"font-size:17px;\">🛍️<\u002Fspan>\n                  <input type=\"text\" value=\"{{ onboardLink }}\" oninput=\"{{ handleOnboardLink }}\" placeholder=\"https://shope.ee/xxxxx\" style=\"border:none; outline:none; background:transparent; font-size:13px; color:#1C0900; width:100%; font-family:'Poppins',sans-serif;\">\n                <\u002Fdiv>\n                <div style=\"background:#FFF0EB; border-radius:8px; padding:11px; font-size:11px; color:#7A4A35; line-height:1.5;\">✨ AI akan extract nama produk, benefit, target market, dan langsung generate 20 variasi caption!<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- Nav buttons -->\n            <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n              <sc-if value=\"{{ notIsStep1 }}\">\n                <div onclick=\"{{ prevStep }}\" style=\"font-size:13px; color:#EE4D2D; cursor:pointer; font-weight:500;\">← Kembali<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ isStep1 }}\">\n                <div style=\"font-size:12px; color:#C0A090;\">Langkah 1 dari 3<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ isStep3 }}\">\n                <div onclick=\"{{ finishOnboard }}\" style=\"background:#EE4D2D; color:#fff; border-radius:10px; padding:11px 26px; font-size:13px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(238,77,45,0.3);\">🚀 Mulai Generate!<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ notIsStep3 }}\">\n                <div onclick=\"{{ nextStep }}\" style=\"background:#EE4D2D; color:#fff; border-radius:10px; padding:11px 26px; font-size:13px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(238,77,45,0.3);\">Lanjut →<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═════════════════ px; font-size:10px; font-weight:700;\">✓ Tersimpan<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:8px; background:#FFF9F7; border:1.5px solid #FFD0B8; border-radius:8px; padding:10px 13px; margin-bottom:8px;\">\n              <span>🔑<\u002Fspan>\n              <input type=\"password\" value=\"{{ anthropicKey }}\" oninput=\"{{ handleAnthropicKey }}\" placeholder=\"sk-ant-api03-xxxxxxxx\" style=\"border:none; outline:none; background:transparent; font-size:12px; color:#1C0900; width:100%; font-family:'Poppins',sans-serif;\">\n            <\u002Fdiv>\n            <div style=\"font-size:10px; color:#B08070;\">Daftar di <strong>console.anthropic.com<\u002Fstrong> → API Keys → Create Key<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Replicate API -->\n          <div style=\"background:#fff; border-radius:12px; padding:22px; border:1px solid #F0E4DC; box-shadow:0 1px 4px rgba(0,0,0,0.04); margin-bottom:14px;\">\n            <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:14px;\">\n              <div style=\"width:36px; height:36px; background:linear-gradient(135deg,#1565C0,#0D47A1); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px;\">🖼️<\u002Fdiv>\n              <div>\n                <div style=\"font-size:13px; font-weight:700; color:#1C0900;\">Replicate API Key<\u002Fdiv>\n                <div style=\"font-size:10px; color:#B08070;\">Untuk Flux Kontext — generate foto avatar<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ hasReplicateKey }}\"><div style=\"margin-left:auto; background:#E8F5E9; color:#2E7D32; border-radius:6px; padding:3px 10px; font-size:10px; font-weight:700;\">✓ Tersimpan<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:8px; background:#FFF9F7; border:1.5px solid #FFD0B8; border-radius:8px; padding:10px 13px; margin-bottom:8px;\">\n              <span>🔑<\u002Fspan>\n              <input type=\"password\" value=\"{{ replicateKey }}\" oninput=\"{{ handleReplicateKey }}\" placeholder=\"r8_xxxxxxxxxxxxxxxx\" style=\"border:none; outline:none; background:transparent; font-size:12px; color:#1C0900; width:100%; font-family:'Poppins',sans-serif;\">\n            <\u002Fdiv>\n            <div style=\"font-size:10px; color:#B08070;\">Daftar di <strong>replicate.com/account/api-tokens<\u002Fstrong> → Create Token. ~$0.05/foto<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Threads API -->\n          <div style=\"background:#fff; border-radius:12px; padding:22px; border:1px solid #F0E4DC; box-shadow:0 1px 4px rgba(0,0,0,0.04); margin-bottom:20px; position:relative; overflow:hidden;\">\n            <div style=\"position:absolute; top:12px; right:14px; background:#FFF3E0; color:#E65100; border-radius:6px; padding:3px 10px; font-size:9px; font-weight:700;\">COMING SOON<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:14px;\">\n              <div style=\"width:36px; height:36px; background:linear-gradient(135deg,#1C0900,#3A1500); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px;\">🧵<\u002Fdiv>\n              <div>\n                <div style=\"font-size:13px; font-weight:700; color:#1C0900;\">Threads API (Meta)<\u002Fdiv>\n                <div style=\"font-size:10px; color:#B08070;\">Untuk auto-post caption ke akun Threads kamu<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap:10px; margin-bottom:10px;\">\n              <div style=\"flex:1;\">\n                <div style=\"font-size:10px; font-weight:600; color:#7A4A35; margin-bottom:6px;\">Access Token<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:8px; background:#F5EDE6; border:1.5px solid #E8D8CC; border-radius:8px; padding:10px 13px;\">\n                  <span>🔑<\u002Fspan>\ rker Kamu (opsional)<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:8px; background:#FFF9F7; border:1.5px solid #FFD0B8; border-radius:8px; padding:10px 13px;\">\n                <span>☁️<\u002Fspan>\n                <input type=\"text\" value=\"{{ cfWorkerUrl }}\" oninput=\"{{ handleCfWorkerUrl }}\" placeholder=\"https://my-proxy.workers.dev\" style=\"border:none; outline:none; background:transparent; font-size:12px; color:#1C0900; width:100%; font-family:'Poppins',sans-serif;\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Save button -->\n          <div onclick=\"{{ saveSettings }}\" style=\"background:linear-gradient(135deg,#EE4D2D,#FF7B5C); border-radius:12px; padding:14px; text-align:center; cursor:pointer; font-size:14px; font-weight:700; color:#fff; box-shadow:0 4px 16px rgba(238,77,45,0.3); transition:transform 0.15s;\" style-hover=\"transform:translateY(-2px);\">\n            <sc-if value=\"{{ settingsSaved }}\">✅ Tersimpan ke browser!<\u002Fsc-if>\n            <sc-if value=\"{{ notSettingsSaved }}\">💾 Simpan Semua API Keys<\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"font-size:10px; color:#B08070; text-align:center; margin-top:8px;\">Keys disimpan di localStorage browser kamu — tidak dikirim ke mana pun<\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══════════════════ SHOPEE API ══════════════════ -->\n      <sc-if value=\"{{ showShopee }}\">\n        <!-- Tabs -->\n        <div style=\"display:flex; gap:8px; margin-bottom:18px;\">\n          <sc-if value=\"{{ isShopeeSettings }}\"><div style=\"background:#EE4D2D; color:#fff; border-radius:8px; padding:7px 16px; font-size:12px; font-weight:600; cursor:pointer;\">⚙️ Settings<\u002Fdiv><\u002Fsc-if>\n          <sc-if value=\"{{ notIsShopeeSettings }}\"><div onclick=\"{{ setShopeeSettings }}\" style=\"background:#fff; color:#7A4A35; border:1px solid #F0E4DC; border-radius:8px; padding:7px 16px;          <span style=\"font-size:18px;\">⚠️<\u002Fspan>\n            <div style=\"font-size:12px; color:#EE4D2D; font-weight:500;\">{{ trendError }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ hasTrendTopics }}\">\n          <div style=\"display:grid; grid-template-columns:{{ cols2 }}; gap:14px;\">\n            <sc-for list=\"{{ trendTopics }}\" as=\"trend\">\n              <div style=\"background:#fff; border-radius:11px; padding:18px; border:1px solid #F0E4DC; box-shadow:0 1px 4px rgba(0,0,0,0.04);\">\n                <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:10px;\">\n                  <div style=\"font-size:26px;\">{{ trend.emoji }}<\u002Fdiv>\n                  <div>\n                    <div style=\"font-size:13px; font-weight:700; color:#1C0900;\">{{ trend.topic }}<\u002Fdiv>\n                    <div style=\"font-size:10px; font-weight:600; color:#EE4D2D; background:#FFF0EB; padding:2px 8px; border-radius:4px; display:inline-block; margin-top:2px;\">{{ trend.engagement }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:12px; color:#7A4A35; line-height:1.55; background:#FFF9F7; border-radius:8px; padding:10px; border:1px solid #F5EDE6; font-style:italic;\">\"{{ trend.hook }}\"<\u002Fdiv>\n                <div onclick=\"{{ goToGenerator }}\" style=\"margin-top:10px; font-size:11px; color:#EE4D2D; cursor:pointer; font-weight:500;\">✨ Generate caption dari topik ini →<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noTrendTopics }}\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px; background:#fff; border-radius:12px; border:1px solid #F0E4DC; text-align:center;\">\n            <div style=\"font-size:48px; margin-bottom:14px;\">🔥<\u002Fdiv>\n            <div style=\"font-size:16px; font-weight:700; color:#1C0900; margin-bottom:6px;\">Scan Trending Topics<\u002Fdiv>\n            <div style=\"font-size:12px; color:#B08070;\">AI akan suggest 8 topik viral yang bisa jadi caption relevan dengan produkmu<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n\n      <!-- ══════════════════ IMAGE PROMPT ══════════════════ -->\n      <sc-if value=\"{{ showImgPrompt }}\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;\">\n          <div>\n            <div style=\"font-size:13px; color:#7A4A35;\">Generate Midjourney/SD prompt untuk foto konten avatar <strong>{{ activeAvatarLabel }}<\u002Fstrong><\u002Fdiv>\n            <div style=\"font-size:11px; color:#B08070; margin-top:2px;\">Produk: {{ productName }} · Copy prompt → paste ke Midjourney / Stable Diffusion / DALL·E<\u002Fdiv>\n          <\u002Fdiv>\n          <div onclick=\"{{ generateImagePrompt }}\" style=\"background:linear-gradient(135deg,#EE4D2D,#FF7B5C); color:#fff; border-radius:8px; padding:8px 16px; font-size:12px; font-weight:600; cursor:pointer; box-shadow:0 3px 10px rgba(238,77,45,0.25);\">\n            <sc-if value=\"{{ isGeneratingPrompt }}\">⏳ Generating prompts...<\u002Fsc-if>\n            <sc-if value=\"{{ notIsGeneratingPrompt }}\">🎨 Generate 4 Prompts<\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasPromptError }}\">\n          <div style=\"background:#FFF0EB; border-radius:10px; padding:14px 18px; margin-bottom:14px; border:1px solid #FFD0B8; display:flex; gap:10px; align-items:center;\">\n            <span style=\"font-size:18px;\">⚠️<\u002Fspan>\n            <div style=\"font-size:12px; color:#EE4D2D; font-weight:500;\">{{ promptError }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ hasImagePrompts }}\">\n          <div style=\"display:grid; grid-template-columns:{{ cols2 }}; gap:14px;\">\n            <sc-for list=\"{{ imagePrompts }}\" as=\"prompt\">\n              <div style=\"background:#fff; border-radius:11px; padding:18px; border:1px solid #F0E4DC; box-shadow:0 1px 4px rgba(0,0,0,0.04);\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;\">\n                  <div style=\"font-size:12px; font-weight:700; color:#1C0900;\">{{ prompt.scene }}<\u002Fdiv>\n                  <span style=\"font-size:11px; color:#7A4A35; background:#F5EDE6; padding:3px 9px; border-radius:5px;\">{{ prompt.style }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:11px; color:#7A4A35; line-height:1.6; background:#FFF9F7; border-radius:8px; padding:12px; border:1px solid #F5EDE6; margin-bottom:10px; font-family:monospace;\">{{ prompt.prompt }}<\u002Fdiv>\n                <div style=\"display:flex; gap:7px;\">\n                  <div onclick=\"{{ prompt.copyPromptFn }}\" style=\"flex:1; background:#EE4D2D; color:#fff; border-radius:7px; padding:8px; text-align:center; font-size:11px; font-weight:600; cursor:pointer;\">📋 Copy Prompt<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noImagePrompts }}\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px; background:#fff; border-radius:12px; border:1px solid #F0E4DC; text-align:center;\">\n            <div style=\"font-size:48px; margin-bottom:14px;\">🎨<\u002Fdiv>\n            <div style=\"font-size:16px; font-weight:700; color:#1C0900; margin-bottom:6px;\">Generate Foto Prompt AI<\u002Fdiv>\n            <div style=\"font-size:12px; color:#B08070; line-height:1.5;\">4 prompt siap pakai untuk Midjourney / Stable Diffusion<br>disesuaikan dengan avatar dan produkmu<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n\n      <!-- ══════════════════ FLUX KONTEXT ══════════════════ -->\n      <sc-if value=\"{{ showFlux }}\">\n        <div style=\"display:grid; grid-template-columns:{{ colsFlux }}; gap:20px;\">\n\n          <!-- Left: Config Panel -->\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n\n            <!-- API Key -->\n            <div style=\"background:#fff; border-radius:12px; padding:18px; border:1px solid #F0E4DC; box-shadow:0 1px 4px rgba(0,0,0,0.04);\">\n              <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:10px;\">\n                <div style=\"font-size:13px; font-weight:700; color:#1C0900;\">Replicate API Key<\u002Fdiv>\n                <span style=\"font-size:9px; background:#FFF0EB; color:#EE4D2D; padding:2px 7px; border-radius:4px; font-weight:700;\">REQUIRED<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:8px; background:#FFF9F7; border:1.5px solid #FFD0B8; border-radius:8px; padding:9px 12px;\">\n                <span style=\"font-size:13px;\">🔑<\u002Fspan>\n                <input type=\"password\" value=\"{{ fluxApiKey }}\" oninput=\"{{ handleFluxKeyInput }}\" placeholder=\"r8_xxxxxxxxxxxx\" style=\"border:none; outline:none; background:transparent; font-size:12px; color:#1C0900; width:100%; font-family:'Poppins',sans-serif;\">\n              <\u002Fdiv>\n              <div style=\"font-size:10px; color:#B08070; margin-top:6px;\">replicate.com/account/api-tokens · Jangan share key ini!<\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Reference Image -->\n            <div style=\"background:#fff; border-radius:12px; padding:18px; border:1px solid #F0E4DC; box-shadow:0 1px 4px rgba(0,0,0,0.04);\">\n              <div style=\"font-size:13px; font-weight:700; color:#1C0900; margin-bottom:4px;\">Foto Referensi Safira<\u002Fdiv>\n              <div style=\"font-size:10px; color:#B08070; margin-bottom:12px;\">Upload foto karakter → AI akan jaga konsistensi wajah di semua foto<\u002Fdiv>\n              <sc-if value=\"{{ noFluxRefImage }}\">\n                <div onclick=\"{{ triggerFluxUpload }}\" style=\"display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:24px; background:#FFF9F7; border:2px dashed #FFD0B8; border-radius:10px; cursor:pointer; text-align:center; transition:border-color 0.15s,background 0.15s;\" style-hover=\"background:#FFF0EB; border-color:#EE4D2D;\">\n                  <div style=\"font-size:28px;\">📸<\u002Fdiv>\n                  <div style=\"font-size:12px; font-weight:600; color:#EE4D2D;\">Klik untuk upload foto referensi<\u002Fdiv>\n                  <div style=\"font-size:10px; color:#B08070;\">JPG/PNG · Tanpa upload = text-to-image<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ hasFluxRefImage }}\">\n                <div style=\"position:relative; border-radius:10px; overflow:hidden;\">\n                  {{ fluxRefImageEl }}\n                  <div onclick=\"{{ removeFluxImage }}\" style=\"position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.6); color:#fff; border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer; font-weight:600;\">✕ Hapus<\u002Fdiv>\n                  <div style=\"position:absolute; bottom:8px; left:8px; background:rgba(76,175,80,0.9); color:#fff; border-radius:6px; padding:4px 10px; font-size:10px; font-weight:700;\">✓ Referensi siap<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <!-- Scene / Prompt -->\n            <div style=\"background:#fff; border-radius:12px; padding:18px; border:1px solid #F0E4DC; box-shadow:0 1px 4px rgba(0,0,0,0.04);\">\n              <div style=\"font-size:13px; font-weight:700; color:#1C0900; margin-bottom:10px;\">Scene / Pose<\u002Fdiv>\n              <div style=\"display:flex; flex-wrap:wrap; gap:7px; margin-bottom:12px;\">\n                <div onclick=\"{{ setWeekendScene }}\" style=\"background:#FFF0EB; color:#EE4D2D; border-radius:20px; padding:5px 12px; font-size:11px; font-weight:500; cursor:pointer; border:1px solid #FFD0B8;\">☕ Weekend<\u002Fdiv>\n                <div onclick=\"{{ setWorkScene }}\" style=\"background:#FFF0EB; color:#EE4D2D; border-radius:20px; padding:5px 12px; font-size:11px; font-weight:500; cursor:pointer; border:1px solid #FFD0B8;\">💼 Kerja<\u002Fdiv>\n                <div onclick=\"{{ setShoppingScene }}\" style=\"background:#FFF0EB; color:#EE4D2D; border-radius:20px; padding:5px 12px; font-size:11px; font-weight:500; cursor:pointer; border:1px solid #FFD0B8;\">🛍️ Shopping<\u002Fdiv>\n                <div onclick=\"{{ setOutdoorScene }}\" style=\"background:#FFF0EB; color:#EE4D2D; border-radius:20px; padding:5px 12px; font-size:11px; font-weight:500; cursor:pointer; border:1px solid #FFD0B8;\">🌿 Outdoor<\u002Fdiv>\n                <div onclick=\"{{ setUnboxingScene }}\" style=\"background:#FFF0EB; color:#EE4D2D; border-radius:20px; padding:5px 12px; font-size:11px; font-weight:500; cursor:pointer; border:1px solid #FFD0B8;\">📦 Unboxing<\u002Fdiv>\n              <\u002Fdiv>\n              {{ fluxSceneTextarea }}\n            <\u002Fdiv>\n\n            <!-- Generate Button -->\n            <div onclick=\"{{ generateFlux }}\" style=\"background:linear-gradient(135deg,#EE4D2D,#FF7B5C); border-radius:12px; padding:16px; text-align:center; cursor:pointer; box-shadow:0 4px 16px rgba(238,77,45,0.35); transition:transform 0.15s,box-shadow 0.15s;\" style-hover=\"transform:translateY(-2px); box-shadow:0 8px 24px rgba(238,77,45,0.4);\">\n              <sc-if value=\"{{ fluxGenerating }}\">\n                <div style=\"font-size:15px; font-weight:700; color:#fff;\">⏳ Generating foto...<\u002Fdiv>\n                <div style=\"font-size:10px; color:rgba(255,255,255,0.8); margin-top:3px;\">Flux Kontext Pro · ~30–50 detik<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ notFluxGenerating }}\">\n                <div style=\"font-size:15px; font-weight:700; color:#fff;\">🖼️ Generate Foto Safira<\u002Fdiv>\n                <div style=\"font-size:10px; color:rgba(255,255,255,0.8); margin-top:3px;\">Flux Kontext Pro · karakter konsisten<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n\n          <!-- Right: Result Panel -->\n          <div style=\"background:#fff; border-radius:12px; padding:20px; border:1px solid #F0E4DC; box-shadow:0 1px 4px rgba(0,0,0,0.04); display:flex; flex-direction:column;\">\n            <div style=\"font-size:13px; font-weight:700; color:#1C0900; margin-bottom:16px;\">Hasil Generate<\u002Fdiv>\n\n            <sc-if value=\"{{ fluxGenerating }}\">\n              <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; text-align:center;\">\n                <div style=\"font-size:48px; margin-bottom:16px;\">🖼️<\u002Fdiv>\n                <div style=\"font-size:15px; font-weight:700; color:#1C0900; margin-bottom:8px;\">Flux Kontext lagi kerja...<\u002Fdiv>\n                <div style=\"font-size:12px; color:#B08070; line-height:1.6; margin-bottom:20px;\">Generating foto Safira dengan<br>karakter konsisten · ~30–50 detik<\u002Fdiv>\n                <div style=\"display:flex; gap:7px;\">\n                  <div style=\"width:10px; height:10px; background:#EE4D2D; border-radius:50%; animation:bounce1 1.2s infinite;\"><\u002Fdiv>\n                  <div style=\"width:10px; height:10px; background:#EE4D2D; border-radius:50%; animation:bounce2 1.2s 0.2s infinite;\"><\u002Fdiv>\n                  <div style=\"width:10px; height:10px; background:#EE4D2D; border-radius:50%; animation:bounce3 1.2s 0.4s infinite;\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ hasFluxError }}\">\n              <div style=\"background:#FFF0EB; border-radius:10px; padding:16px; margin-bottom:14px; border:1px solid #FFD0B8; text-align:center;\">\n                <div style=\"font-size:20px; margin-bottom:6px;\">⚠️<\u002Fdiv>\n                <div style=\"font-size:12px; color:#EE4D2D; font-weight:600;\">{{ fluxError }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ hasFluxResult }}\">\n              <div style=\"flex:1; display:flex; flex-direction:column; gap:14px;\">\n                <div style=\"border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.12);\">\n                  {{ fluxResultEl }}\n                <\u002Fdiv>\n                <div style=\"display:flex; gap:8px;\">\n                  <a href=\"{{ fluxResultHref }}\" download=\"safira-flux.jpg\" style=\"flex:1; background:#EE4D2D; color:#fff; border-radius:8px; padding:10px; text-align:center; font-size:12px; font-weight:600; cursor:pointer; text-decoration:none; display:block;\">⬇️ Download Foto<\u002Fa>\n                  <div onclick=\"{{ goToPreview }}\" style=\"flex:1; background:#FFF0EB; color:#EE4D2D; border-radius:8px; padding:10px; text-align:center; font-size:12px; font-weight:600; cursor:pointer; border:1px solid #FFD0B8;\">👁️ Preview di Threads<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#FFF9F7; border-radius:8px; padding:12px; border:1px solid #F5EDE6; font-size:11px; color:#7A4A35; line-height:1.5;\">💡 <strong>Tips:<\u002Fstrong> Upload foto ini sebagai referensi untuk generate berikutnya agar wajah Safira makin konsisten!<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ noFluxResult }}\">\n              <sc-if value=\"{{ notFluxGenerating }}\">\n                <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px;\">\n                  <div style=\"width:120px; height:160px; background:linear-gradient(135deg,#FFF0EB,#F5EDE6); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:48px; margin-bottom:20px; border:2px dashed #FFD0B8;\">{{ activeAvatarEmoji }}<\u002Fdiv>\n                  <div style=\"font-size:14px; font-weight:700; color:#1C0900; margin-bottom:6px;\">Foto Safira akan muncul di sini<\u002Fdiv>\n                  <div style=\"font-size:11px; color:#B08070; line-height:1.6;\">1. Masukkan API key<br>2. Upload foto referensi (opsional)<br>3. Pilih scene → Generate!<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 800 },\n  &quot;startScreen&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;dashboard&quot;,&quot;avatar&quot;,&quot;generator&quot;,&quot;library&quot;,&quot;calendar&quot;,&quot;analytics&quot;,&quot;onboarding&quot;], &quot;default&quot;: &quot;dashboard&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'dashboard',\n    onboardStep: 1,\n    selectedNiche: 'fashion',\n    onboardAvatarType: 'indonesian',\n    onboardAvatarName: 'Safira',\n    onboardLink: '',\n    selectedAvatar: 'indonesian',\n    contentType: 'humor',\n    calendarMode: '30',\n    shopeeLink: '',\n    productName: '',\n    // New screens state\n    shopeeAppId: '',\n    shopeeSecretKey: '',\n    shopeeTab: 'settings',\n    isConnected: false,\n    isConnecting: false,\n    analyzedProduct: null,\n    isAnalyzing: false,\n    bulkCaptions: [],\n    isGeneratingBulk: false,\n    bulkProgress: 0,\n    libraryFilter: 'semua',\n    previewCaption: '',\n    trendTopics: [],\n    isLoadingTrends: false,\n    imagePrompts: [],\n    isGeneratingPrompt: false,\n    trendError: '',\n    promptError: '',\n    bulkError: '',\n    analyzeError: '',\n    // Flux Kontext\n    fluxApiKey: '',\n    fluxRefImage: null,\n    fluxScenePrompt: '',\n    fluxGenerating: false,\n    fluxResult: null,\n    fluxError: '',\n    // Global API Settings\n    anthropicKey: '',\n    replicateKey: '',\n    threadsToken: '',\n    threadsUserId: '',\n    settingsSaved: false,\n    cfWorkerUrl: '',\n    // Mobile\n    windowWidth: (typeof window !== 'undefined' ? window.innerWidth : 1280),\n    mobileMenuOpen: false,\n    // Threads posting\n    isPosting: false,\n    postSuccess: false,\n    postError: '',\n    // Scheduling\n    schedule: {},\n    pendingSchedule: null,\n    selectedCalDate: null,\n    scheduleTimeInput: '09:00',\n    scheduleTextInput: '',\n    isGenerating: false,\n    generatedCaptions: [],\n    genError: '',\n    libraryItems: [],\n    copiedNum: null,\n    savedFeedback: false,\n  }\n\n  async generateFlux() {\n    const { fluxApiKey, fluxRefImage, fluxScenePrompt, selectedAvatar } = this.state;\n    if (!fluxApiKey.trim()) { this.setState({ fluxError: 'Masukkan API key Replicate dulu!' }); return; }\n    this.setState({ fluxGenerating: true, fluxResult: null, fluxError: '' });\n\n    const avatarDesc = {\n      indonesian: '24-year-old Indonesian woman, casual modern style, warm skin tone, dark brown hair',\n      korean: '24-year-old Korean woman, soft beauty aesthetic, light skin, straight black hair',\n      hijabi: '24-year-old Muslim woman wearing colorful hijab, modest elegant fashion',\n      office: '28-year-old professional Asian woman, smart office attire',\n      mom: '30-year-old young Asian mother, warm approachable smile',\n      college: '21-year-old trendy Asian college girl, streetwear aesthetic',\n    }[selectedAvatar] || '24-year-old Indonesian woman';\n\n    const scene = fluxScenePrompt || 'smiling naturally at camera, lifestyle photo';\n    const prompt = `${avatarDesc}, ${scene}, photorealistic portrait, soft natural lighting, high quality, Instagram aesthetic, Threads content photo`;\n\n    // Use corsproxy.io to bypass sandbox CORS restriction\n    const key = (fluxApiKey || this.state.replicateKey || '').trim();\n    if (!key) { this.setState({ fluxGenerating: false, fluxError: 'Masukkan Replicate API key di Pengaturan dulu!' }); return; }\n\n    const input = { prompt, output_format: 'jpg', output_quality: 85, aspect_ratio: '9:16' };\n    if (fluxRefImage) input.input_image = fluxRefImage;\n\n    const REPLICATE_API = 'https://api.replicate.com/v1/predictions';\n    // If a Cloudflare Worker proxy is configured, use it directly as the primary API endpoint\n    // (skip the doomed direct-to-Replicate attempt, since browsers can't call it due to CORS).\n    const cfBase = (this.state.cfWorkerUrl || '').trim().replace(/\\/$/, '');\n    const API = cfBase ? cfBase + '/v1/predictions' : REPLICATE_API;\n    const PROXIES = [\n      'https://proxy.cors.sh/' + REPLICATE_API,\n      'https://corsproxy.io/?url=' + encodeURIComponent(REPLICATE_API),\n    ];\n\n    const poll = async (url) => {\n      for (let i = 0; i < 12; i++) {\n        await new Promise(r => setTimeout(r, 5000));\n        try {\n          const pr = await fetch(url, { headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' } });\n          const pd = await pr.json();\n          if (pd.status === 'succeeded' && pd.output) return Array.isArray(pd.output) ? pd.output[0] : pd.output;\n          if (pd.status === 'failed') throw new Error(pd.error || 'Prediction failed');\n        } catch(pe) { if (pe.message !== 'Prediction failed') continue; else throw pe; }\n      }\n      throw new Error('Timeout 60 detik. Coba lagi!');\n    };\n\n    try {\n      const res = await fetch(API, {\n        method: 'POST',\n        headers: {\n          'Authorization': `Bearer ${key}`,\n          'Content-Type': 'application/json',\n        },\n        body: JSON.stringify({\n          model: 'black-forest-labs/flux-kontext-pro',\n          input,\n        }),\n      });\n\n      if (!res.ok) {\n        const e = await res.text();\n        this.setState({ fluxGenerating: false, fluxError: `API Error ${res.status}: ${e.slice(0, 150)}` });\n        return;\n      }\n\n      const data = await res.json();\n\n      // Immediate output\n      if (data.output) {\n        const url = Array.isArray(data.output) ? data.output[0] : data.output;\n        this.setState({ fluxGenerating: false, fluxResult: url });\n        return;\n      }\n\n      if (data.error) { this.setState({ fluxGenerating: false, fluxError: `Error: ${data.error}` }); return; }\n\n      // Poll for result\n      if (data.urls && data.urls.get) {\n        try {\n          const url = await poll(data.urls.get);\n          this.setState({ fluxGenerating: false, fluxResult: url });\n        } catch(pe) {\n          this.setState({ fluxGenerating: false, fluxError: pe.message });\n        }\n        return;\n      }\n\n      this.setState({ fluxGenerating: false, fluxError: 'Response tidak dikenali. Coba lagi.' });\n    } catch(e) {\n      // Direct blocked — try proxies in order\n      // Strip base64 image when using proxy (too large, use text-to-image instead)\n      const inputForProxy = { ...input };\n      if (inputForProxy.input_image && inputForProxy.input_image.startsWith('data:')) {\n        delete inputForProxy.input_image;\n      }\n      let lastErr = e.message;\n      for (const proxyBase of PROXIES) {\n        try {\n          this.setState({ fluxError: `🔄 Coba via proxy...` });\n          const proxyUrl = proxyBase;\n          const headers = { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' };\n          if (proxyBase.includes('cors.sh')) headers['x-cors-api-key'] = 'temp_free';\n          const res2 = await fetch(proxyUrl, {\n            method: 'POST',\n            headers,\n            body: JSON.stringify({ model: 'black-forest-labs/flux-kontext-pro', input: inputForProxy }),\n          });\n          if (!res2.ok) { lastErr = `Proxy Error ${res2.status}: ${(await res2.text()).slice(0,120)}`; continue; }\n          const d2 = await res2.json();\n          if (d2.output) { const u = Array.isArray(d2.output)?d2.output[0]:d2.output; this.setState({fluxGenerating:false,fluxResult:u}); return; }\n          if (d2.error) { lastErr = `API Error: ${d2.error}`; continue; }\n          if (d2.urls && d2.urls.get) {\n            const pollProxy = 'https://proxy.cors.sh/' + d2.urls.get;\n            try {\n              const u = await poll(pollProxy);\n              this.setState({ fluxGenerating:false, fluxResult:u }); return;\n            } catch(pe) { lastErr = pe.message; continue; }\n          }\n        } catch(pe) { lastErr = pe.message; continue; }\n      }\n      this.setState({ fluxGenerating:false, fluxError:`❌ Semua proxy gagal: ${lastErr}\\n\\n💡 Solusi: Buat Cloudflare Worker gratis sebagai proxy — lihat panduan di Pengaturan.` });\n    }\n  }\n\n  // Universal AI caller — window.claude in DC, Anthropic API on GitHub Pages\n  async aiComplete(prompt) {\n    if (window.claude && window.claude.complete) {\n      return await window.claude.complete(prompt);\n    }\n    const key = (this.state.anthropicKey || '').trim();\n    if (!key) throw new Error('⚙️ Masukkan Anthropic API key di menu Pengaturan!');\n    const res = await fetch('https://api.anthropic.com/v1/messages', {\n      method: 'POST',\n      headers: {\n        'x-api-key': key,\n        'anthropic-version': '2023-06-01',\n        'content-type': 'application/json',\n        'anthropic-dangerous-direct-browser-access': 'true',\n      },\n      body: JSON.stringify({ model: 'claude-opus-4-5', max_tokens: 2048, messages: [{ role: 'user', content: prompt }] }),\n    });\n    if (!res.ok) { const e = await res.text(); throw new Error(`Anthropic Error ${res.status}: ${e.slice(0,100)}`); }\n    const data = await res.json();\n    return (data.content && data.content[0] && data.content[0].text) || '';\n  }\n\n  async analyzeProduct() {\n Graph API mungkin butuh proxy juga — cek Pengaturan.` });\n    }\n  }\n\n  // ── Scheduling ──\n  saveSchedule(newSchedule) {\n    localStorage.setItem('shopyai_schedule', JSON.stringify(newSchedule));\n    this.setState({ schedule: newSchedule });\n  }\n\n  addScheduleItem(dateKey, time, text, type) {\n    const sched = { ...this.state.schedule };\n    const list = sched[dateKey] ? [...sched[dateKey]] : [];\n    list.push({ id: Date.now() + Math.random(), time: time || '09:00', text, type: type || 'humor' });\n    list.sort((a,b) => a.time.localeCompare(b.time));\n    sched[dateKey] = list;\n    this.saveSchedule(sched);\n  }\n\n  deleteScheduleItem(dateKey, id) {\n    const sched = { ...this.state.schedule };\n    if (sched[dateKey]) {\n      sched[dateKey] = sched[dateKey].filter(i => i.id !== id);\n      if (sched[dateKey].length === 0) delete sched[dateKey];\n      this.saveSchedule(sched);\n    }\n  }\n\n  saveSettings() {\n    const { anthropicKey, replicateKey, threadsToken, threadsUserId, cfWorkerUrl } = this.state;\n    const keys = { anthropicKey, replicateKey, threadsToken, threadsUserId, cfWorkerUrl };\n    localStorage.setItem('shopyai_keys', JSON.stringify(keys));\n    this.setState({ fluxApiKey: replicateKey, settingsSaved: true });\n    setTimeout(() => this.setState({ settingsSaved: false }), 2000);\n  }\n\n  copyCaption(text, num) {\n    const write = () => {\n      navigator.clipboard.writeText(text).catch(() => {\n        const el = document.createElement('textarea');\n        el.value = text; document.body.appendChild(el);\n        el.select(); document.execCommand('copy');\n        document.body.removeChild(el);\n      });\n    };\n    write();\n    this.setState({ copiedNum: num });\n    setTimeout(() => this.setState({ copiedNum: null }), 2000);\n  }\n\n  saveToLibrary() {\n    const { generatedCaptions, contentType } = this.state;\n    if (!generatedCaptions.length) return;\n    const newItems = generatedCaptions.map(c => ({\n      id: Date
